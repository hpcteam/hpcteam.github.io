<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>

  <body>
    <header class="page-header" role="banner">
      <h1 class="project-name">{{ page.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>

      <!-- TOP NAVIGATION (GREEN AREA) -->
      <nav style="margin-top:20px;">
        <a href="/" style="color:white;margin:0 12px;">Home</a>
        <a href="/documentation/" style="color:white;margin:0 12px;">Documentation</a>
        <a href="/services/" style="color:white;margin:0 12px;">Services</a>
        <a href="/infrastructure/" style="color:white;margin:0 12px;">Infrastructure</a>
        <a href="/contact/" style="color:white;margin:0 12px;">Contact</a>
      </nav>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-credits">
          This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.
        </span>
      </footer>
    </main>
  </body>
</html>

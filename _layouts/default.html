<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Cayman theme CSS -->
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
</head>

<body>

  <!-- HEADER (GREEN AREA) -->
  <header class="page-header" role="banner" style="position: relative;">

    <!-- TOP RIGHT NAVIGATION (ROUNDED BUTTONS) -->
    <nav style="
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 15px;
      white-space: nowrap;
    ">

      <a href="/" style="
        color: white;
        margin-left: 12px;
        padding: 6px 14px;
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 20px;
        text-decoration: none;
      ">Home</a>

      <a href="/projects/" style="
        color: white;
        margin-left: 12px;
        padding: 6px 14px;
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 20px;
        text-decoration: none;
      ">Projects</a>

      <a href="/documentation/" style="
        color: white;
        margin-left: 12px;
        padding: 6px 14px;
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 20px;
        text-decoration: none;
      ">Documentation</a>

      <a href="/contact/" style="
        color: white;
        margin-left: 12px;
        padding: 6px 14px;
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 20px;
        text-decoration: none;
      ">Contact</a>

    </nav>

    <!-- PAGE TITLE -->
    <h1 class="project-name">{{ page.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>

  </header>

  <!-- MAIN CONTENT -->
  <main id="content" class="main-content" role="main">
    {{ content }}

    <!-- FOOTER -->
    <footer class="site-footer">
      <span class="site-footer-credits">
        This page was generated by
        <a href="https://pages.github.com">GitHub Pages</a>.
      </span>
    </footer>
  </main>

</body>
</html>

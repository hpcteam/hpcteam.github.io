<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux MCQ Test - Page 1</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 20px;
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
  }

  .question {
    background: #fff;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
  }

  .options label {
    display: block;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 6px;
  }

  .options label:hover {
    background-color: #e8f2ff;
  }

  button {
    display: block;
    margin: 30px auto;
    padding: 12px 30px;
    font-size: 16px;
    background-color: #1e90ff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:disabled {
    background-color: gray;
    cursor: not-allowed;
  }

  /* Popup */
  #popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    z-index: 1000;
  }

  #popup h3 {
    text-align: center;
    margin-bottom: 15px;
  }

  #popup p {
    font-size: 14px;
    text-align: left;
    margin-bottom: 10px;
  }

  #popup button {
    margin-top: 15px;
    width: 100%;
  }
</style>
</head>

<body>

<h2>Linux MCQ Test – Part 1</h2>

<form id="quizForm">

  <!-- Q1 -->
  <div class="question">
    <p>1. Which command is used to list files in Linux?</p>
    <div class="options">
      <label><input type="radio" name="q1" value="A"> A) ls</label>
      <label><input type="radio" name="q1" value="B"> B) cd</label>
      <label><input type="radio" name="q1" value="C"> C) pwd</label>
      <label><input type="radio" name="q1" value="D"> D) mkdir</label>
    </div>
  </div>

  <!-- Q2 -->
  <div class="question">
    <p>2. Default shell in most Linux systems?</p>
    <div class="options">
      <label><input type="radio" name="q2" value="A"> A) csh</label>
      <label><input type="radio" name="q2" value="B"> B) bash</label>
      <label><input type="radio" name="q2" value="C"> C) ksh</label>
      <label><input type="radio" name="q2" value="D"> D) sh</label>
    </div>
  </div>

  <!-- Q3 -->
  <div class="question">
    <p>3. Command to change file permissions?</p>
    <div class="options">
      <label><input type="radio" name="q3" value="A"> A) chmod</label>
      <label><input type="radio" name="q3" value="B"> B) chown</label>
      <label><input type="radio" name="q3" value="C"> C) ls</label>
      <label><input type="radio" name="q3" value="D"> D) passwd</label>
    </div>
  </div>

  <!-- Q4 -->
  <div class="question">
    <p>4. What does grep do?</p>
    <div class="options">
      <label><input type="radio" name="q4" value="A"> A) Change directory</label>
      <label><input type="radio" name="q4" value="B"> B) Search text in files</label>
      <label><input type="radio" name="q4" value="C"> C) Disk usage</label>
      <label><input type="radio" name="q4" value="D"> D) Move files</label>
    </div>
  </div>

  <!-- Q5 -->
  <div class="question">
    <p>5. Symbol to overwrite output to file?</p>
    <div class="options">
      <label><input type="radio" name="q5" value="A"> A) >></label>
      <label><input type="radio" name="q5" value="B"> B) ></label>
      <label><input type="radio" name="q5" value="C"> C) <</label>
      <label><input type="radio" name="q5" value="D"> D) |</label>
    </div>
  </div>

  <button type="button" id="submitBtn" onclick="submitTest()">Submit Test</button>
</form>

<!-- Result Popup -->
<div id="popup">
  <div id="resultText"></div>
  <button onclick="goNext()">Continue to Next Set</button>
</div>

<script>
function submitTest() {

  const answers = {
    q1: {correct: "A", text: "ls"},
    q2: {correct: "B", text: "bash"},
    q3: {correct: "A", text: "chmod"},
    q4: {correct: "B", text: "Search text in files"},
    q5: {correct: "B", text: ">"}
  };

  let score = 0;
  let review = "";

  for (let i = 1; i <= 5; i++) {
    const q = "q" + i;
    const selected = document.querySelector(`input[name=${q}]:checked`);

    if (!selected) {
      review += `<p><b>Question ${i}:</b> Not Answered ❌<br>
      <b>Correct:</b> ${answers[q].text}</p>`;
      continue;
    }

    if (selected.value === answers[q].correct) {
      score++;
    } else {
      review += `<p><b>Question ${i}:</b> Wrong ❌<br>
      <b>Your Answer:</b> ${selected.value}<br>
      <b>Correct:</b> ${answers[q].text}</p>`;
    }
  }

  document.getElementById("resultText").innerHTML = `
    <h3>Your Score: ${score} / 5</h3>
    ${review ? "<hr><h4>Review</h4>" + review : "<p>🎉 All answers correct!</p>"}
  `;

  document.getElementById("popup").style.display = "block";
  document.getElementById("submitBtn").disabled = true;
}

function goNext() {
  window.location.href = "page2.html";
}
</script>

</body>
</html>
